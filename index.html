<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海面上昇シミュレーション</title>
  </head>
  <body>
    <div id="map"></div>

    <!-- 操作パネル（標高ソースの選択肢は実行時に生成） -->
    <div class="map-overlay">
      <div class="map-overlay-inner">
        <h2>海面上昇シミュレーション</h2>
        <label>海面高さ: <span id="elevation-value">0m</span></label>
        <input id="elevation-slider" type="range" min="0" max="50" step="0.1" value="0" />
        <label for="source-selector">標高タイル:</label>
        <select id="source-selector"></select>
        <input id="disclaimer-button" type="button" value="免責事項" />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
